<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kasey Resume</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        background: #0f172a;
        color: #f8fafc;
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        max-width: 980px;
        margin: 0 auto;
        padding: 24px 16px 48px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.25rem;
        text-align: center;
      }

      img {
        width: 100%;
        height: auto;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        background: #ffffff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Kasey Lightheart Resume</h1>
      <img alt="Resume page 1" src="/assets/resume-page-1.png" />
      <img alt="Resume page 2" src="/assets/resume-page-2.png" />
    </main>
  </body>
</html>
